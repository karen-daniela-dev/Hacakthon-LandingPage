<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURGER HUB</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

</head>

<body class="d-flex flex-column min-vh-100">
<!-- header  -->
  <header class="tienda__header sticky-top z-3">
    <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
      <div class="container debug">
        <!-- brend -->
        <a class="navbar-brand tienda__logo" href="index.html">BURGER HUB</a>
        <!-- botón mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTienda"
          aria-controls="navbarTienda" aria-expanded="false" aria-label="toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- contenido -->
        <div class="collapse navbar-collapse" id="navbarTienda">
          <!-- links -->
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item"></li>
              <a class="nav-link active" href="#hero">Home</a>
            
            <li class="nav-item"></li>
            <a class="nav-link active" href="#menu">Menú</a>
            </li>
          </ul>

          <!-- Iconos -->
          <div class="d-flex align-items-center gap-3">
            <!-- login -->
            <a href="#" class="btn btn-outline-light btn-sm">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" style="color: white"
                class="bi bi-heart" viewBox="0 0 16 16">
                <path
                  d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01zM8 15C-7.333 4.868 3.279-3.04 7.824 1.143q.09.083.176.171a3 3 0 0 1 .176-.17C12.72-3.042 23.333 4.867 8 15" />
              </svg></a>



            <!-- carrito -->
            <a class="tienda__icon position-relative" data-bs-toggle="offcanvas" data-bs-target="#carritoCanvas">
              <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" style="color: white" fill="currentColor"
                class="bi bi-bag" viewBox="0 0 16 16">
                <path
                  d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1m3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z" />
              </svg>
              <span class="tienda__cart-badge" style="color: white;">2</span>
            </a>



          </div>
        </div>
      </div>
    </nav>
  </header>

   <!-- ================= MAIN ================= -->
  <main class="flex-fill tienda">

    <!-- HERO -->
    <section class="tienda__hero d-flex align-items-center" id="hero">
      <div class="container">
        <div class="row align-items-center">

          <div class="col-lg-6 text-center text-lg-start">
            <p class="tienda__tagline">THE ULTIMATE</p>
            <h1 class="tienda__title">Burger Hub</h1>
            <p class="tienda__subtitle">No la pienses, muérdela</p>
            <a href="#menu" class="btn tienda__btn">Pídela ahora</a>
          </div>

          <div class="col-lg-6 text-center mt-4 mt-lg-0">
            <img src="assets/golden-crunch-hero.png"
              alt="Hamburguesa"
              class="tienda__hero-img img-fluid">
          </div>

        </div>
      </div>
    </section>

    <!-- PRODUCTOS -->
    <section class="tienda__categorias2" id="menu">
      <div class="container ">

        <h2 class="text-center mb-4">Explora nuestras hamburguesas</h2>

        <!-- aqui se renderizan las tarjetas de hambur  -->
        <div id="contenedor-hamburguesas" class="row g-4"></div> 

      </div>
    </section>

  </main>

  <!-- ================= FOOTER ================= -->
  <footer class="tienda__footer">

    <img src="assets/double-beast.png"
      alt="burger izquierda"
      class="tienda__footer-burger tienda__footer-burger--left">

    <div class="tienda__footer-content">

      <h2 class="tienda__footer-logo">BURGER HUB</h2>

      <p class="tienda__footer-equipo">
        Equipo 07:  Maria · Robinson · Manuel · Karen
      </p>

      <p class="tienda__footer-copy">
        © 2026 Burger Hub
      </p>

    </div>

    <img src="assets/mega-stack.png"
      alt="burger derecha"
      class="tienda__footer-burger tienda__footer-burger--right">

  </footer>

  <!-- ================= CARRITO ================= -->
  <div class="offcanvas offcanvas-end carrito-offcanvas"
    tabindex="-1"
    id="carritoCanvas">

    <div class="offcanvas-header">
      <h5 class="offcanvas-title">🛒 Tu pedido</h5>
      <button type="button" class="btn-close"
        data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body d-flex flex-column">

      <!-- Items -->
      <div id="carrito-items" class="flex-grow-1"></div>

      <hr>

      <!-- Total -->
      <p class="fw-bold">
        Total: <span id="total-carrito">$0</span>
      </p>

      <!-- Botones -->
      <button id="btn-vaciar"
        class="btn btn-danger w-100 mt-2">
        Vaciar carrito
      </button>

      <a id="btn-whatsapp"
        target="_blank"
        class="btn btn-success w-100 mt-2">
        Pedir por WhatsApp
      </a>

    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
